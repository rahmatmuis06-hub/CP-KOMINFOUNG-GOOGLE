<div id="upload-form-modal" class="modal-overlay" style="display:none">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="upload-modal-title">📤 Upload Hasil Karya</h2>
      <button class="btn-close" onclick="closeUploadForm()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Info Konten -->
      <div class="upload-content-info" id="upload-content-info">
        <div class="upload-info-row">
          <span class="upload-info-label">Konten:</span>
          <span class="upload-info-value" id="upload-content-title">-</span>
        </div>
        <div class="upload-info-row">
          <span class="upload-info-label">PIC:</span>
          <span class="upload-info-value" id="upload-content-pic">-</span>
        </div>
        <div class="upload-info-row">
          <span class="upload-info-label">Platform:</span>
          <span class="upload-info-value" id="upload-content-platform">-</span>
        </div>
      </div>

      <!-- Existing File Info -->
      <div id="upload-existing-file" class="upload-existing-file" style="display:none">
        <div class="existing-file-header" style="margin-bottom: 8px;">
          <span>📎 File yang sudah diupload:</span>
        </div>
        <div id="upload-existing-list" class="existing-files-list">
          <!-- List file terlampir akan dirender secara dinamis di sini -->
        </div>
      </div>

      <input type="hidden" id="upload-content-id">

      <!-- Pilih Folder -->
      <div class="form-group">
        <label>📁 Pilih Folder Tujuan</label>
        <div id="folder-dropdowns-container" class="folder-select-group">
          <select class="form-select" disabled>
            <option value="">Memuat folder...</option>
          </select>
        </div>
        
        <!-- Toggle Tambah Folder Baru -->
        <div class="new-folder-toggle-btn" onclick="toggleNewFolderForm()" id="btn-toggle-new-folder" style="display:none;">
          <span>➕ Tambah Folder Baru</span>
        </div>
        
        <!-- Form Tambah Folder Baru (Hidden by default) -->
        <div id="new-folder-form-container" class="new-folder-form" style="display:none;">
          <div class="new-folder-label">
            Buat Folder Baru di: <span id="new-folder-parent-name">Root Folder</span>
          </div>
          <div class="new-folder-input-group">
            <input type="text" id="new-folder-name-input" class="form-input-folder" placeholder="Nama folder baru...">
            <button type="button" class="btn btn-primary" onclick="submitNewFolder()" style="padding:6px 12px;font-size:0.85rem;">Buat</button>
            <button type="button" class="btn btn-secondary" onclick="toggleNewFolderForm()" style="padding:6px 12px;font-size:0.85rem;">Batal</button>
          </div>
        </div>
      </div>

      <!-- Drop Zone -->
      <div class="upload-dropzone" id="upload-dropzone">
        <div class="dropzone-icon">☁️</div>
        <div class="dropzone-text">
          <strong>Drag & drop file di sini</strong>
          <p>atau klik untuk browse file</p>
        </div>
        <input type="file" id="upload-file-input" class="dropzone-input" multiple
          accept="image/png,image/jpeg,image/gif,image/webp,video/mp4,video/quicktime,video/x-msvideo,application/pdf,.ai,.psd,.eps,.svg">
      </div>

      <!-- File Preview Queue -->
      <div id="upload-preview" class="upload-preview" style="display:none">
        <div class="preview-header" style="margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
          <span>📋 Antrean File yang akan diupload:</span>
          <button type="button" class="btn btn-secondary" onclick="clearFilePreview()" style="padding: 2px 8px; font-size: 0.75rem;">✕ Bersihkan</button>
        </div>
        <div id="upload-preview-list" class="preview-files-list">
          <!-- Preview file antrean akan dirender secara dinamis di sini -->
        </div>
      </div>

      <!-- Upload Progress -->
      <div id="upload-progress" class="upload-progress" style="display:none">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="upload-progress-bar"></div>
        </div>
        <span id="upload-progress-text" class="progress-text">Mengupload...</span>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeUploadForm()">Batal</button>
        <button type="button" class="btn btn-primary" id="btn-upload-submit" onclick="handleUploadSubmit()" disabled>
          📤 Upload File
        </button>
      </div>
    </div>
  </div>
</div>
