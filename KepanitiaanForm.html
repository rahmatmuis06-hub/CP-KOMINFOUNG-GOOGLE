<div id="kepanitiaan-form-modal" class="modal-overlay" style="display:none">
  <div class="modal-content" style="max-width: 500px;">
    <div class="modal-header">
      <h2>Tambah Kegiatan & Kepanitiaan</h2>
      <button class="btn-close" onclick="closeKepanitiaanForm()">✕</button>
    </div>
    <div class="modal-body">
      <form id="kepanitiaan-form" onsubmit="handleKepanitiaanSubmit(event)">
        
        <div class="form-group">
          <label for="kepanitiaan-form-month">📅 Pilih Bulan Kegiatan</label>
          <select id="kepanitiaan-form-month" class="form-select" required>
            <option value="">Pilih Bulan...</option>
            <option value="FEBRUARI">Februari</option>
            <option value="MARET">Maret</option>
            <option value="APRIL">April</option>
            <option value="MEI">Mei</option>
            <option value="JUNI">Juni</option>
            <option value="JULI">Juli</option>
            <option value="AGUSTUS">Agustus</option>
            <option value="SEPTEMBER">September</option>
            <option value="OKTOBER">Oktober</option>
            <option value="NOVEMBER">November</option>
            <option value="DESEMBER">Desember</option>
          </select>
        </div>
        
        <input type="hidden" id="kepanitiaan-form-index">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px;">
          <label style="margin-bottom: 0;">📢 Nama Kegiatan / Event</label>
          <button type="button" id="kepanitiaan-bulk-toggle" onclick="toggleKepanitiaanBulkMode()" class="btn" style="font-size:0.72rem; padding:2px 8px; border:1px solid var(--border-glass); background:rgba(255,255,255,0.05); color:var(--secondary); height:auto; margin:0; line-height:1;">Tambah Banyak</button>
        </div>
        
        <div class="form-group" id="kepanitiaan-single-group">
          <input type="text" id="kepanitiaan-form-title" class="form-input" required placeholder="Contoh: Webinar Desain Grafis">
        </div>
        
        <div class="form-group" id="kepanitiaan-bulk-group" style="display:none;">
          <textarea id="kepanitiaan-form-title-bulk" class="form-input" rows="4" placeholder="Masukkan nama kegiatan, satu per baris.&#10;Contoh:&#10;Webinar Jurnalistik&#10;Pelatihan Fotografi&#10;Rapat Evaluasi"></textarea>
          <span style="font-size:0.75rem; color:var(--text-secondary); display:block; margin-top:4px;">Setiap baris akan ditambahkan sebagai kegiatan baru dengan daftar panitia yang sama.</span>
        </div>
        
        <div class="form-group">
          <label>👥 Anggota Panitia (Pilih beberapa)</label>
          <div id="kepanitiaan-members-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.15); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border-glass);">
            <!-- Will be populated dynamically -->
            <div style="color: var(--text-secondary); font-size: 0.85rem; grid-column: 1 / -1; text-align: center;">Memuat daftar anggota tim...</div>
          </div>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeKepanitiaanForm()">Batal</button>
          <button type="submit" class="btn btn-primary">💾 Simpan Kegiatan</button>
        </div>
      </form>
    </div>
  </div>
</div>
