<section id="view-content-detail" class="view">
  <!-- Header Row -->
  <div class="view-header" style="flex-wrap: wrap; gap: var(--space-md);">
    <div style="display: flex; align-items: center; gap: var(--space-md); flex-wrap: wrap;">
      <button class="btn btn-secondary" onclick="goBackToPreviousView()" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-weight: 600;">
        <span>⬅️</span> Kembali
      </button>
      <h2 id="detail-view-title" class="view-title" style="margin: 0; font-size: 1.4rem;">Detail Konten</h2>
      <span id="detail-view-id" style="color: var(--primary); font-size: 0.85rem; font-family: monospace; background: rgba(6, 182, 212, 0.1); padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid rgba(6, 182, 212, 0.2); font-weight: 700;">-</span>
    </div>
    
    <div class="detail-actions-top" style="display: flex; gap: var(--space-sm); flex-wrap: wrap;">
      <button type="button" class="btn btn-primary" id="btn-detail-edit" onclick="handleDetailEdit()" style="display: inline-flex; align-items: center; gap: 6px; font-weight: 600;">
        <span>✏️</span> Edit Konten
      </button>
      <button type="button" class="btn btn-secondary" id="btn-detail-upload" onclick="openUploadForm(App.currentDetailContentId)" style="display: inline-flex; align-items: center; gap: 6px; font-weight: 600; background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border: 1px solid var(--border-glass);">
        <span>📎</span> Kelola File
      </button>
      <button type="button" class="btn btn-success" id="btn-detail-download" onclick="handleDetailDownload()" style="display: inline-flex; align-items: center; gap: 6px; font-weight: 600; background: var(--status-completed); border-color: var(--status-completed); color: #fff;">
        <span>📥</span> Download
      </button>
      <button type="button" class="btn btn-danger-outline" id="btn-detail-delete" onclick="handleDetailDelete()" style="display: inline-flex; align-items: center; gap: 6px; font-weight: 600;">
        <span>🗑️</span> Hapus
      </button>
    </div>
  </div>

  <!-- Main View Body -->
  <div class="view-body" style="margin-top: var(--space-lg);">
    <div class="detail-split-layout">
      <!-- Left Side: Information Pane -->
      <div class="detail-info-pane" style="display: flex; flex-direction: column; gap: var(--space-md);">
        <!-- Details Grid -->
        <div class="detail-grid">
          <div class="detail-card">
            <span class="detail-label">📅 Tanggal Posting</span>
            <span id="detail-date" class="detail-value">-</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">👤 PIC Design</span>
            <span id="detail-pic" class="detail-value">-</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">📱 Platform</span>
            <span id="detail-platform" class="detail-value">-</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">🎨 Format &amp; Rasio</span>
            <span id="detail-format-ratio" class="detail-value">-</span>
          </div>
        </div>

        <!-- Status & Template Link -->
        <div style="display: flex; flex-direction: column; gap: var(--space-md);">
          <div class="detail-card flex-row-card">
            <span class="detail-label" style="margin-bottom: 0;">🏷️ Status</span>
            <span id="detail-status-badge">-</span>
          </div>
          <div class="detail-card flex-row-card" id="detail-template-wrapper">
            <span class="detail-label" style="margin-bottom: 0;">🔗 Template Link</span>
            <a id="detail-template-link" href="#" target="_blank" class="detail-link" style="max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Buka Template</a>
          </div>
        </div>

        <!-- Caption / Deskripsi -->
        <div class="detail-desc-section">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-xs);">
            <span class="detail-label" style="margin-bottom: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-primary);">📝 Caption / Deskripsi Konten</span>
            <button class="btn btn-secondary btn-xs" onclick="copyDetailDescription()" style="padding: 4px 10px; font-size: 0.72rem; font-weight: 600;">
              📋 Copy Caption
            </button>
          </div>
          <div id="detail-description" class="detail-desc-box"></div>
        </div>

        <!-- Attached Files Section -->
        <div class="detail-desc-section" id="detail-files-wrapper" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-xs);">
            <span class="detail-label" style="margin-bottom: 0; font-size: 0.85rem; font-weight: 600; color: var(--text-primary);">📎 File Terlampir</span>
            <button class="btn btn-secondary btn-xs" id="btn-delete-all-files" onclick="handleDeleteAllFilesFromDetail()" style="padding: 4px 10px; font-size: 0.72rem; font-weight: 600; color: var(--status-urgent); border-color: rgba(244, 63, 94, 0.15); background: rgba(244, 63, 94, 0.05); cursor: pointer;">
              🗑️ Hapus Semua
            </button>
          </div>
          <div id="detail-files-list" style="display: flex; flex-direction: column; gap: 8px;">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </div>

      <!-- Right Side: Preview Pane -->
      <div class="detail-preview-pane" style="display: flex; flex-direction: column; gap: var(--space-sm);">
        <span class="detail-label" style="font-size: 0.85rem; font-weight: 600; color: var(--text-primary);">🎬 Preview Konten</span>
        <div id="detail-preview-container" class="preview-container">
          <!-- Dynamically populated iframe or placeholder -->
        </div>
        <!-- Thumbnails for multi-file attachments -->
        <div id="detail-preview-thumbs" class="preview-thumbs" style="display: none;">
          <!-- Dynamically populated thumbnails -->
        </div>
      </div>
    </div>
  </div>
</section>
