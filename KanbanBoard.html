<section id="view-kanban" class="view">
  <!-- Header -->
  <div class="view-header">
    <h2 class="view-title">📋 Papan Kanban</h2>
    <div class="view-actions">
      <div class="filter-group">
        <select id="kanban-filter-month" class="form-select">
          <option value="1">Januari</option>
          <option value="2">Februari</option>
          <option value="3">Maret</option>
          <option value="4">April</option>
          <option value="5">Mei</option>
          <option value="6">Juni</option>
          <option value="7">Juli</option>
          <option value="8">Agustus</option>
          <option value="9">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">Desember</option>
        </select>
        <select id="kanban-filter-year" class="form-select">
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
          <option value="2030">2030</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Kanban Board -->
  <div class="kanban-board">
    <!-- Draft Column -->
    <div class="kanban-column" data-status="Draft">
      <div class="kanban-column-header">
        <div class="column-title">
          <span class="status-dot" style="background: #64748b"></span>
          <h3>Draft</h3>
        </div>
        <span class="count-badge" id="count-draft">0</span>
      </div>
      <div class="kanban-cards" id="kanban-draft"></div>
    </div>

    <!-- In Progress Column -->
    <div class="kanban-column" data-status="In Progress">
      <div class="kanban-column-header">
        <div class="column-title">
          <span class="status-dot" style="background: #f59e0b"></span>
          <h3>In Progress</h3>
        </div>
        <span class="count-badge" id="count-inprogress">0</span>
      </div>
      <div class="kanban-cards" id="kanban-inprogress"></div>
    </div>

    <!-- Review Column -->
    <div class="kanban-column" data-status="Review">
      <div class="kanban-column-header">
        <div class="column-title">
          <span class="status-dot" style="background: #3b82f6"></span>
          <h3>Review</h3>
        </div>
        <span class="count-badge" id="count-review">0</span>
      </div>
      <div class="kanban-cards" id="kanban-review"></div>
    </div>

    <!-- Completed Column -->
    <div class="kanban-column" data-status="Completed">
      <div class="kanban-column-header">
        <div class="column-title">
          <span class="status-dot" style="background: #10b981"></span>
          <h3>Completed</h3>
        </div>
        <span class="count-badge" id="count-completed">0</span>
      </div>
      <div class="kanban-cards" id="kanban-completed"></div>
    </div>
  </div>
</section>
