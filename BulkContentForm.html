<section id="view-bulk-add" class="view">
  <!-- Header Row matching Dashboard/Calendar/etc. -->
  <div class="view-header">
    <h2 class="view-title">📚 Tambah Banyak Konten</h2>
    <div class="view-actions">
      <button type="button" class="btn btn-secondary" onclick="closeBulkContentForm()">
        <span>⬅️</span> Kembali
      </button>
      <button type="button" class="btn btn-primary" onclick="addBulkRow()">
        <span>➕</span> Tambah Baris
      </button>
    </div>
  </div>

  <!-- Main Card wrapper -->
  <div class="glass-card" style="margin-top: var(--space-md); padding: var(--space-lg);">
    <div class="bulk-actions-top" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md);">
      <div class="bulk-counter" id="bulk-row-counter">Total: 0 baris</div>
    </div>

    <form id="bulk-content-form" onsubmit="handleBulkContentSubmit(event)">
      <div class="bulk-table-wrapper">
        <table class="bulk-table">
          <thead>
            <tr>
              <th style="width: 14%; min-width: 120px;">📅 Tanggal</th>
              <th style="width: 26%; min-width: 200px;">📝 Judul Konten</th>
              <th style="width: 15%; min-width: 130px;">👤 PIC</th>
              <th style="width: 11%; min-width: 100px;">📱 Platform</th>
              <th style="width: 11%; min-width: 100px;">🎨 Jenis</th>
              <th style="width: 10%; min-width: 90px;">📐 Rasio</th>
              <th style="width: 10%; min-width: 110px;">🏷️ Status</th>
              <th style="width: 3%; min-width: 45px; text-align: center;">Aksi</th>
            </tr>
          </thead>
          <tbody id="bulk-table-body">
            <!-- Dynamically populated row by row -->
          </tbody>
        </table>
      </div>

      <!-- Action Footer -->
      <div style="display: flex; justify-content: flex-end; gap: var(--space-md); margin-top: var(--space-lg); border-top: 1px solid var(--border-glass); padding-top: var(--space-md);">
        <button type="button" class="btn btn-secondary" onclick="closeBulkContentForm()">Batal</button>
        <button type="submit" class="btn btn-primary">💾 Simpan Semua</button>
      </div>
    </form>
  </div>
</section>
