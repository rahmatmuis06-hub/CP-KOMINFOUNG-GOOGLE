function openKepanitiaanForm(month, eventIdx) {
  if (!checkProfileSelected()) return;
  const modal = document.getElementById('kepanitiaan-form-modal');
  const form = document.getElementById('kepanitiaan-form');
  const bulkToggle = document.getElementById('kepanitiaan-bulk-toggle');
  form.reset();
  
  kepanitiaanBulkMode = true;
  toggleKepanitiaanBulkMode(); // Sets to false (Single Mode)
  
  // Populate team members list
  const container = document.getElementById('kepanitiaan-members-container');
  if (!container) return;
  
  const members = App.teamData || [];
  if (members.length === 0) {
    container.innerHTML = '<div style="color: var(--text-secondary); font-size: 0.85rem; grid-column: 1 / -1; text-align: center;">Tidak ada anggota tim yang termuat. Silakan muat ulang halaman.</div>';
    return;
  }
  
  container.innerHTML = members.map(m => `
    <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; cursor:pointer;">
      <input type="checkbox" class="kep-member-cb" value="${escapeHtml(m.name)}">
      <span>${escapeHtml(m.name)}</span>
    </label>
  `).join('');
  
  if (month !== undefined && eventIdx !== undefined) {
    // Edit mode
    bulkToggle.style.display = 'none';
    
    const monthData = App.kepanitiaanData.find(m => m.month.toUpperCase() === month.toUpperCase());
    if (!monthData || !monthData.events[eventIdx]) {
      showToast('Kegiatan tidak ditemukan!', 'error');
      return;
    }
    
    const event = monthData.events[eventIdx];
    
    document.getElementById('kepanitiaan-form-index').value = eventIdx;
    document.getElementById('kepanitiaan-form-month').value = month.toUpperCase();
    document.getElementById('kepanitiaan-form-month').disabled = true; // Disable month select during edit
    document.getElementById('kepanitiaan-form-title').value = event.title;
    
    // Check members
    const memberCbs = document.querySelectorAll('.kep-member-cb');
    memberCbs.forEach(cb => {
      const isMember = event.members.some(name => name.toLowerCase().trim() === cb.value.toLowerCase().trim() || cb.value.toLowerCase().trim().includes(name.toLowerCase().trim()));
      cb.checked = isMember;
    });
  } else {
    // Add mode
    bulkToggle.style.display = 'block';
    document.getElementById('kepanitiaan-form-index').value = '';
    document.getElementById('kepanitiaan-form-month').value = '';
    document.getElementById('kepanitiaan-form-month').disabled = false;
  }
  
  modal.style.display = 'flex';
}

function closeKepanitiaanForm() {
  document.getElementById('kepanitiaan-form-modal').style.display = 'none';
}

function handleKepanitiaanSubmit(e) {
  e.preventDefault();
  if (!checkProfileSelected()) return;
  
  const monthSelect = document.getElementById('kepanitiaan-form-month');
  const month = monthSelect.value;
  const eventIdxVal = document.getElementById('kepanitiaan-form-index').value;
  
  // Collect selected members
  const members = [];
  document.querySelectorAll('.kep-member-cb').forEach(cb => {
    if (cb.checked) members.push(cb.value);
  });
  
  if (members.length === 0) {
    showToast('Harap pilih minimal satu anggota panitia!', 'warning');
    return;
  }
  
  const monthData = App.kepanitiaanData.find(m => m.month.toUpperCase() === month.toUpperCase());
  let monthEvents = monthData ? JSON.parse(JSON.stringify(monthData.events)) : []; // Deep copy
  
  if (eventIdxVal !== '') {
    // Edit mode
    const eventIdx = parseInt(eventIdxVal, 10);
    const title = document.getElementById('kepanitiaan-form-title').value.trim();
    
    monthEvents[eventIdx] = {
      title: title,
      members: members
    };
    
    showLoading();
    google.script.run
      .withSuccessHandler(function(result) {
        hideLoading();
        closeKepanitiaanForm();
        showToast('Kepanitiaan berhasil diupdate!', 'success');
        loadKepanitiaanData();
      })
      .withFailureHandler(function(err) {
        hideLoading();
        showToast('Gagal mengupdate Kepanitiaan: ' + err.message, 'error');
      })
      .updateKepanitiaanEvents(month, monthEvents);
      
  } else {
    // Add mode
    if (kepanitiaanBulkMode) {
      const bulkTitlesText = document.getElementById('kepanitiaan-form-title-bulk').value.trim();
      const titles = bulkTitlesText.split('\n').map(t => t.trim()).filter(t => t !== '');
      
      if (titles.length === 0) {
        showToast('Harap masukkan minimal satu nama kegiatan!', 'warning');
        return;
      }
      
      titles.forEach(title => {
        monthEvents.push({
          title: title,
          members: members
        });
      });
    } else {
      const title = document.getElementById('kepanitiaan-form-title').value.trim();
      monthEvents.push({
        title: title,
        members: members
      });
    }
    
    showLoading();
    google.script.run
      .withSuccessHandler(function(result) {
        hideLoading();
        closeKepanitiaanForm();
        showToast('Kepanitiaan berhasil ditambahkan!', 'success');
        loadKepanitiaanData();
      })
      .withFailureHandler(function(err) {
        hideLoading();
        showToast('Gagal menambah Kepanitiaan: ' + err.message, 'error');
      })
      .updateKepanitiaanEvents(month, monthEvents);
  }
}

function handleDeleteKepanitiaanEvent(month, eventIdx) {
  if (!confirm('Apakah Anda yakin ingin menghapus kegiatan kepanitiaan ini?')) {
    return;
  }
  
  const monthData = App.kepanitiaanData.find(m => m.month.toUpperCase() === month.toUpperCase());
  if (!monthData || !monthData.events[eventIdx]) {
    showToast('Kegiatan tidak ditemukan!', 'error');
    return;
  }
  
  let monthEvents = JSON.parse(JSON.stringify(monthData.events));
  monthEvents.splice(eventIdx, 1);
  
  showLoading();
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      showToast('Kepanitiaan berhasil dihapus!', 'success');
      loadKepanitiaanData();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('Gagal menghapus Kepanitiaan: ' + err.message, 'error');
    })
    .updateKepanitiaanEvents(month, monthEvents);
}
